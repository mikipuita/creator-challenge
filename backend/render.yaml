services:
  - type: web
    name: threatlens-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: OPENAI_API_KEY
        sync: false
      - key: SHODAN_API_KEY
        sync: false
      - key: DEMO_MODE
        value: "true"
      - key: ALLOWED_ORIGINS
        sync: false
    healthCheckPath: /api/health
